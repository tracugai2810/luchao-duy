<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="description" content="Ứng dụng lập quẻ Lục Hào - Gieo xu và Seri tiền">
    <meta name="theme-color" content="#7f1d1d">
    <title>Lập Quẻ Lục Hào</title>

    <!-- html2canvas for screenshot -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="styles.css">
    <link rel="preload" href="kha.png" as="image">
</head>

<body>
    <div class="app-container">
        <!-- Header -->
        <header class="app-header">
            <div class="header-content">
                <div class="logo">☰</div>
                <h1>Lập Quẻ Lục Hào</h1>
            </div>
        </header>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Input Section -->
            <section class="input-section card">
                <h2 class="section-title">
                    <span class="icon">📅</span>
                    Thông Tin Lập Quẻ
                </h2>

                <!-- Date Time Input -->
                <div class="form-group">
                    <label for="inputDate">Thời gian gieo quẻ (Dương lịch)</label>
                    <input type="datetime-local" id="inputDate" class="form-input">
                </div>

                <!-- Tab Navigation -->
                <div class="tabs">
                    <button class="tab-btn active" data-tab="coins" onclick="switchTab('coins')">
                        <span class="tab-icon">🔘</span>
                        <span class="tab-text">Gieo Xu</span>
                    </button>
                    <button class="tab-btn" data-tab="serial" onclick="switchTab('serial')">
                        <span class="tab-icon">💵</span>
                        <span class="tab-text">Seri Tiền</span>
                    </button>
                    <button class="tab-btn" data-tab="number" onclick="switchTab('number')">
                        <span class="tab-icon">🔢</span>
                        <span class="tab-text">Chọn Số</span>
                    </button>

                </div>

                <!-- Tab: Coins -->
                <div id="tab-coins" class="tab-content active">
                    <button class="btn btn-secondary" onclick="startCoinToss()">
                        <span class="btn-icon">🎲</span>
                        Gieo Xu (Thủ công)
                    </button>

                    <div class="lines-input" id="linesContainer">
                        <!-- Lines will be generated by JS -->
                    </div>
                </div>

                <!-- Tab: Serial -->
                <div id="tab-serial" class="tab-content">
                    <div class="form-group">
                        <label for="serialInput">Nhập dãy số Seri Tiền</label>
                        <input type="text" id="serialInput" class="form-input" placeholder="Ví dụ: 12345678"
                            inputmode="numeric" onkeyup="cleanSerialInput(this)">
                        <small class="form-hint">Chỉ nhập số, bỏ qua chữ cái</small>
                    </div>
                </div>

                <!-- Tab: Number -->
                <div id="tab-number" class="tab-content">
                    <div class="form-group">
                        <label for="num1">Số 1 (Thượng Quái)</label>
                        <input type="number" id="num1" class="form-input" placeholder="Nhập số bất kỳ"
                            inputmode="numeric">
                    </div>
                    <div class="form-group">
                        <label for="num2">Số 2 (Hạ Quái)</label>
                        <input type="number" id="num2" class="form-input" placeholder="Nhập số bất kỳ"
                            inputmode="numeric">
                    </div>
                    <div class="form-group">
                        <label for="num3">Số 3 (Hào Động)</label>
                        <input type="number" id="num3" class="form-input" placeholder="Nhập số bất kỳ"
                            inputmode="numeric">
                    </div>
                </div>

                <!-- Submit Button -->
                <div id="divination-controls">
                    <button class="btn btn-primary btn-submit" onclick="processDivination()">
                        <span class="btn-icon">✨</span>
                        Lập Quẻ
                    </button>
                </div>
            </section>

            <!-- Result Section -->
            <section class="result-section" id="resultSection">
                <!-- Result Card with Download Image -->
                <div id="result-display" class="card result-card">
                    <h2 class="section-title">
                        <span class="icon">📊</span>
                        Kết Quả Quẻ
                    </h2>

                    <!-- Image Display Area -->
                    <div class="image-display" id="imageDisplay">
                        <!-- Generated image will appear here -->
                    </div>

                    <div class="save-hint">
                        <span class="hint-desktop">💡 Click chuột phải vào ảnh → "Lưu hình ảnh..." để tải về</span>
                        <span class="hint-mobile">💡 Nhấn giữ vào ảnh để Lưu hoặc Chia sẻ</span>
                    </div>

                    <!-- Download Button for Mobile -->
                    <div class="action-buttons">
                        <button class="btn btn-download" id="downloadBtn" onclick="downloadImage()">
                            <span class="btn-icon">📥</span>
                            Tải Ảnh
                        </button>
                    </div>
                </div>
            </section>
        </main>

        <!-- Hidden Capture Area (for html2canvas) -->
        <div id="captureArea">
            <div id="captureTarget"></div>
        </div>

        <!-- Loading Overlay -->
        <div id="loading-overlay">
            <div class="loader-content">
                <div class="spinner"></div>
                <p>Đang tạo ảnh kết quả...</p>
            </div>
        </div>

        <!-- Coin Toss Modal -->
        <div id="coin-toss-modal" class="modal">
            <div class="modal-content">
                <div class="modal-header">
                    <h3>Gieo Xu Lục Hào</h3>
                    <button class="close-btn" onclick="closeCoinTossModal()">×</button>
                </div>
                <div class="modal-body">
                    <div class="coin-container">
                        <div class="coin-wrapper">
                            <div class="coin" id="coin-1">
                                <div class="coin-face front" style="background-image: url('duong.png');"></div>
                                <div class="coin-face back" style="background-image: url('am.png');"></div>
                            </div>
                        </div>
                        <div class="coin-wrapper">
                            <div class="coin" id="coin-2">
                                <div class="coin-face front" style="background-image: url('duong.png');"></div>
                                <div class="coin-face back" style="background-image: url('am.png');"></div>
                            </div>
                        </div>
                        <div class="coin-wrapper">
                            <div class="coin" id="coin-3">
                                <div class="coin-face front" style="background-image: url('duong.png');"></div>
                                <div class="coin-face back" style="background-image: url('am.png');"></div>
                            </div>
                        </div>
                    </div>

                    <div class="toss-controls">
                        <div class="toss-info">
                            <span id="toss-status">Sẵn sàng gieo hào 1...</span>
                        </div>
                        <button id="toss-btn" class="btn btn-primary" onclick="performToss()">
                            Gieo Hào 1
                        </button>
                        <button id="finish-toss-btn" class="btn btn-download" onclick="finishTossSequence()"
                            style="display: none;">
                            Hoàn Tất
                        </button>
                    </div>

                    <div class="toss-results-container">
                        <div class="toss-results" id="toss-results-list">
                            <!-- Results will be stacked here -->
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>


    <script src="app.js"></script>
</body>

</html>
